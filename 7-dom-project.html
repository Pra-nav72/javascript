<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Projects</title>
    <style>
        body{
            background-color: rgb(152, 250, 218);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .subs-btn{
            min-width: 120px;
            border: none;
            border-radius: 50px;
            background-color: black;
            color: white;
            cursor: pointer;
            padding: 10px 15px;
            /* transition: 0.3s ease all; */
            font-weight: bold;
        }
        /* .subs-btn:hover{
            background-color: rgb(241, 238, 233);
            color: black;
        } */
        .is-subs{
            /* these modifications will be add when the buttun == 'subscribed' us js */
            background-color: whitesmoke;
            color: black;
        }

        .cost-input{
            border-top:none;
            border-right: none;
            box-shadow: 2px 2px 8px black;
            border-bottom: 2px solid black;
            font-size: 15px;
            padding: 5px 8px;
            margin: 10px;
            border-radius: 5px;
            transition: 0.3s ease all;
        }
        .cost-input:focus{
            border-left: 2px solid blueviolet;
            border-bottom: 3px solid blueviolet;
            outline: none;
            box-shadow: 3px 3px 13px blueviolet;
        }
        .calculate-btn{
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 3px solid black;
            background-color: blueviolet;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            padding: 10px 15px;
            margin: 5px;
            font-weight: bold;
            transition: 0.3s ease all;
        }
        .calculate-btn:active{
            transform: translateY(3px);
        }

    </style>
</head>
<body>
    <div>
        <h2>YouTube Subscribe button</h2>
        <!-- it is better to use different class names for js and css -->
        <button class="js-subs subs-btn" onclick="subscribe()">Subscribe</button>
        <br><br>

        <p>Rock Paper Scissors</p>
        <a href="3-rock-paper-scissor.html" target="_blank">click here</a>

        <p>Amazon Shipping Calculator</p>
        <p>orders under <span>&#8377</span>499 = Extra <span>&#8377</span>40 Shipping charges</p>
        <p>orders under <span>&#8377</span>499 = FREE Shipping</p>

        <!-- onkeydown is input from keyboard, onclick is mouse input -->
        <!-- onkeydown(eventListener) has an object named 'event' that holds various info. of the event -->
        <input type="text" required class="js-cost cost-input" placeholder="cost of order" 
            onkeydown="calculateKeyDown(event)">

        <button class="js-calculate calculate-btn" onclick="calculate()">calculate</button><br>
        
        <p class="js-total"></p>
    </div>

    <script>
        function subscribe(){
            const btnSubs = document.querySelector('.js-subs');
            // innerHTML returns text along with whitespaces. Hence, we use innerText
            if (btnSubs.innerText === 'Subscribe'){
                btnSubs.innerHTML = 'Subscribed';
                // 'is-subs' class will be add which already have some css property which'll be applied
                btnSubs.classList.add('is-subs');
            }
            else{
                btnSubs.innerHTML = 'Subscribe';
                // removing 'is-subs'class to use the previous class css properties
                btnSubs.classList.remove('is-subs');
            }
        }


        function calculate(){
            const inputCost = (Number)(document.querySelector('.js-cost').value);
            const total = document.querySelector('.js-total');
            if(inputCost < 499){
                console.log(inputCost);
                total.innerHTML = `<span>&#8377</span>${(inputCost + 40)}`;
            }
            else if (inputCost >= 499){
                console.log(inputCost);
                total.innerHTML= `<span>&#8377</span>${inputCost}`;
            }
            else{
                total.innerHTML = "expected NUMBER!";
                console.log(inputCost);
            }
        }

        function calculateKeyDown(event){
            // if the clicked button is 'Enter' then also calculate the total cost
            if (event.key === 'Enter'){
                console.log(event);
                calculate();
            }
        }
        
    </script>
</body>
</html>
