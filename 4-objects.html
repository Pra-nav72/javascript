<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects</title>
</head>
<body>
    <script>
        const item = {
            name: 'socks',
            price: 340,
            qty: 4
        };

        //display all elements inside item
        console.log(item);      //{name: 'socks', price: 340, qty: 4}

        //values of the property name & price
        console.log(item.name);     //socks
        console.log(item.price);    // 340

        //modify the values of price & qty
        item.price = 555;
        item.qty = 11;

        //adds new property
        item.newProperty = true;
        console.log(item);      //{name: 'socks', price: 555, qty: 11, newProperty: true}


        //removing the new property
        delete item.newProperty;
        console.log(item);      //{name: 'socks', price: 555, qty: 11}

        //type of the item 
        console.log(typeof item);       //object


        // Nested Objects
        const product = {
            name: 'shirt',
            //here we use : instead of =
            details : {
                fibre: 'Cotton',
                wash: 'dry wash'
            }
        };
    
        // Accessing the values of nested objects
        console.log(`nested object: ${product.details.fibre}`)   //nested object: Cotton



        // Function inside object
        const items1 = {
            name : 'movies',

            fun: function demo(){
                console.log('this funcion is inside an object');
            }
        };

        // Accessing the function
        items1.fun();   //this funcion is inside an object


        const object1 = {
            pen: 'Reynolds',
            price: 7888
        };

        //when variable name and oject property name is same
        // const pen = object1.pen;     ----> NOT USE THIS
        const {pen, price} = object1;  // DESTRUCTURING SHORTCUT
        console.log(pen);
        console.log(price);

        //we can also reuse the above
        const object2 = {
            // pen:pen,   -----> if name of property & value is same then use 👇
            pen,         // SHORT-HAND PROPERTY --> write once only.
            method(){
                console.log("SHORT-HAND METHOD PROPERTY");
            }

        };

        console.log(object2.method());
        console.log(object2.pen);


    </script>
</body>
</html>
